<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mô phỏng Diện tích Sân chơi</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 20px; background-color: #f4f4f4; }
        .container { background: white; max-width: 700px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .slider-container { margin: 20px; }
        input[type=range] { width: 80%; cursor: pointer; }
        .highlight { color: #A0522D; font-size: 1.4em; font-weight: bold; }
        #plot { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Mô phỏng Tương tác: Diện tích Sân chơi</h2>
        
        <div class="slider-container">
            <label><b>Độ võng Parabol (h): </b><span id="h_val">20</span> m</label><br><br>
            <input type="range" id="h_slider" min="0" max="40" step="0.5" value="20">
        </div>
        
        <p class="highlight">Diện tích sân chơi: <span id="area_val">3200</span> m²</p>
        
        <div id="plot"></div>
    </div>

    <script>
        function updatePlot() {
            const h = parseFloat(document.getElementById('h_slider').value);
            document.getElementById('h_val').innerText = h;
            
            // Tính toán diện tích thực tế
            const totalArea = 80 * 60;
            const area = totalArea - (80 * h);
            document.getElementById('area_val').innerText = Math.round(area);

            let x_vals = [], y_top = [], y_bottom = [];

            // Vẽ từ -30 đến 30 (chiều rộng 60m)
            for (let x = -30; x <= 30; x += 0.5) {
                x_vals.push(x);
                // Parabol đi qua (-30, 40), (0, 40-h), (30, 40)
                let y_p = (h / 900) * (x * x) + (40 - h);
                y_top.push(y_p);
                y_bottom.push(-y_p);
            }

            const x_polygon = x_vals.concat(x_vals.slice().reverse());
            const y_polygon = y_top.concat(y_bottom.slice().reverse());

            const tracePlayground = {
                x: x_polygon,
                y: y_polygon,
                fill: 'toself',
                fillcolor: '#D2B48C', // Màu cát sân chơi
                line: { color: '#8B4513', width: 2 },
                name: 'Sân chơi',
                type: 'scatter',
                hoverinfo: 'skip'
            };

            const traceOutline = {
                x: [-30, 30, 30, -30, -30],
                y: [40, 40, -40, -40, 40],
                mode: 'lines',
                line: { color: '#333', width: 2, dash: 'dash' },
                name: 'Khung bao',
                type: 'scatter',
                hoverinfo: 'skip'
            };

            const layout = {
                xaxis: { range: [-40, 40], title: 'Chiều rộng (m)', fixedrange: true },
                yaxis: { range: [-50, 50], title: 'Chiều dài (m)', fixedrange: true },
                showlegend: false,
                margin: { l: 50, r: 50, t: 20, b: 50 },
                plot_bgcolor: "#fff"
            };

            Plotly.react('plot', [tracePlayground, traceOutline], layout);
        }

        document.getElementById('h_slider').addEventListener('input', updatePlot);
        window.onload = updatePlot;
    </script>
</body>
</html>
