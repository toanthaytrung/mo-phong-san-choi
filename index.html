<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dự toán Chi phí Sân chơi</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 20px; background-color: #f4f7f6; color: #333; }
        .container { background: white; max-width: 750px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .control-group { display: flex; flex-wrap: wrap; justify-content: space-around; margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        .control-item { margin: 10px; flex: 1; min-width: 250px; }
        input[type=range] { width: 100%; cursor: pointer; }
        input[type=number] { width: 120px; padding: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 1em; }
        .result-box { background: #fff8f0; padding: 15px; border-radius: 10px; border-left: 5px solid #A0522D; margin: 20px 0; }
        .highlight-area { color: #A0522D; font-size: 1.2em; font-weight: bold; }
        .highlight-money { color: #2e7d32; font-size: 1.5em; font-weight: bold; }
        #plot { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Dự toán Chi phí Lát gạch Sân chơi</h2>
        
        <div class="control-group">
            <div class="control-item">
                <label><b>Độ võng Parabol (h): </b><span id="h_val">20</span> m</label><br>
                <input type="range" id="h_slider" min="0" max="40" step="0.5" value="20">
            </div>
            <div class="control-item">
                <label><b>Giá gạch (VNĐ/m²): </b></label><br>
                <input type="number" id="price_input" value="35000" step="1000" min="0">
            </div>
        </div>
        
        <div class="result-box">
            <p>Diện tích sân chơi: <span id="area_val" class="highlight-area">3200</span> m²</p>
            <p>Tổng chi phí hoàn thành: <span id="total_cost" class="highlight-money">112,000,000</span> VNĐ</p>
        </div>
        
        <div id="plot"></div>
    </div>

    <script>
        function formatCurrency(num) {
            return num.toLocaleString('vi-VN');
        }

        function updateAll() {
            const h = parseFloat(document.getElementById('h_slider').value);
            const price = parseFloat(document.getElementById('price_input').value) || 0;
            
            document.getElementById('h_val').innerText = h;
            
            // 1. Tính diện tích: S = S_hcn - 2 * (2/3 * rộng * h) = 4800 - 80h
            const area = 4800 - (80 * h);
            document.getElementById('area_val').innerText = Math.round(area);

            // 2. Tính chi phí
            const cost = area * price;
            document.getElementById('total_cost').innerText = formatCurrency(Math.round(cost));

            // 3. Vẽ đồ thị
            let x_vals = [], y_top = [], y_bottom = [];
            for (let x = -30; x <= 30; x += 0.5) {
                x_vals.push(x);
                let y_p = (h / 900) * (x * x) + (40 - h);
                y_top.push(y_p);
                y_bottom.push(-y_p);
            }

            const x_polygon = x_vals.concat(x_vals.slice().reverse());
            const y_polygon = y_top.concat(y_bottom.slice().reverse());

            const tracePlayground = {
                x: x_polygon,
                y: y_polygon,
                fill: 'toself',
                fillcolor: '#D2B48C',
                line: { color: '#8B4513', width: 2 },
                type: 'scatter',
                hoverinfo: 'skip'
            };

            const traceOutline = {
                x: [-30, 30, 30, -30, -30],
                y: [40, 40, -40, -40, 40],
                mode: 'lines',
                line: { color: '#333', width: 2, dash: 'dash' },
                type: 'scatter',
                hoverinfo: 'skip'
            };

            const layout = {
                xaxis: { range: [-40, 40], title: 'Chiều rộng (m)', fixedrange: true },
                yaxis: { range: [-50, 50], title: 'Chiều dài (m)', fixedrange: true },
                showlegend: false,
                margin: { l: 50, r: 50, t: 20, b: 50 }
            };

            Plotly.react('plot', [tracePlayground, traceOutline], layout);
        }

        // Lắng nghe sự kiện thay đổi
        document.getElementById('h_slider').addEventListener('input', updateAll);
        document.getElementById('price_input').addEventListener('input', updateAll);
        
        // Chạy lần đầu
        window.onload = updateAll;
    </script>
</body>
</html>
